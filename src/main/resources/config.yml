server-name: "<gradient:#AA00AA:#BA55D3>Welcome from NeoTab</gradient>"
animation-style: "rainbow"  # rainbow, purple-pulse, gradient-wave, static
header:
  bold-animation: false      # true restores the old bold animated header style
performance:
  active-preset: "smooth"    # smooth, balanced, light, custom, or a saved preset name
  presets:
    smooth: 3                # ~150ms; smoothest animation, highest update rate
    balanced: 10             # ~500ms; good default for busier servers
    light: 20                # ~1s; lower update rate for lighter server load
  saved-presets: {}          # /tab performance save [name] stores custom presets here
update-interval-ticks: 3     # used for custom mode and kept for older configs
enable-luckperms-prefix: true
enable-placeholderapi: true
update-checker:
  enabled: true              # Checks Modrinth on startup; does not download updates
  include-beta: false        # true also considers Modrinth beta versions
  notify-admins: true        # notify players with neotab.update.notify
  check-delay-seconds: 5
gui:
  enabled: true
tab-profiles:
  spawn:
    server-name: "<gradient:#AA00AA:#BA55D3>Spawn</gradient>"
    animation-style: "static"
    header:
      bold-animation: false
    custom-colors:
      - "#AA00AA"
      - "#BA55D3"
    ram-format: "<gray>Spawn | Online: <light_purple>{online}</light_purple>/<light_purple>{max}</light_purple> | Ping: {playerPing}ms</gray>"
scoreboard:
  enabled: false
  update-interval-ticks: 20
  title: "NeoTab"
  title-animation:
    enabled: true
    style: "static"          # rainbow, purple-pulse, gradient-wave, static
  lines:
    - "&7Online: &d{online}&7/&d{max}"
    - "&7Ping: &d{ping}ms"
    - "&7RAM: &d{ram_used}&7/&d{ram_max} MB"
  presets: {}
extras:
  actionbar:
    enabled: true
    timer:
      enabled: true
      running-format: "{time}"
      paused-format: "Paused {time}"
      ended-format: "timer ends"
    stopwatch:
      enabled: true
      text: "<light_purple>Stopwatch {time}</light_purple>"
    clock:
      enabled: false
      timezone: "Europe/Berlin"
      interval-seconds: 60
      min-interval-seconds: 60
      format: "HH:mm"
      text: "<gray>Time: <light_purple>{time}</light_purple></gray>"
    welcome:
      enabled: true
      delay-ticks: 20
      duration-seconds: 5
      text: "<gradient:#AA00AA:#BA55D3>Welcome {player}!</gradient>"
    random-messages:
      enabled: false
      interval-seconds: 300
      min-interval-seconds: 60
      duration-seconds: 5
      messages:
        - "Drink water! <3"
        - "Stay hydrated!"
        - "Take a small break :)"
        - "Remember to stretch!"
        - "Don't forget to blink :)"
        - "Have fun playing!"
        - "Good luck and have fun!"
        - "Be kind to other players <3"
        - "Enjoy your stay!"
        - "Need help? Use /help"
        - "Join our Discord with /discord"
        - "Found a bug? Tell the staff!"
        - "Invite your friends :)"
        - "Explore, build, survive!"
        - "Your adventure starts here!"
        - "Stay awesome!"
        - "Keep calm and mine on!"
        - "Watch your back!"
        - "Don't dig straight down!"
        - "Diamonds are waiting for you!"
        - "Teamwork makes it easier!"
        - "Respect other players."
        - "A friendly chat makes the server better."
        - "Take care of your inventory!"
        - "Remember to set your home."
        - "Check out the server rules."
        - "Use /spawn to return safely."
        - "New here? Ask the team for help!"
        - "Thanks for playing on this server!"
        - "Have a cozy session :)"
      inactive-message-packs:
        german:
          enabled: false
          messages:
            - "Trink genug Wasser! <3"
            - "Bleib hydriert!"
            - "Mach kurz Pause :)"
            - "Denk ans Strecken!"
            - "Vergiss nicht zu blinzeln :)"
            - "Viel Spaß beim Spielen!"
            - "Viel Glück und viel Spaß!"
            - "Sei nett zu anderen Spielern <3"
            - "Schön, dass du da bist!"
            - "Brauchst du Hilfe? Nutze /help"
            - "Join unserem Discord mit /discord"
            - "Bug gefunden? Sag dem Team Bescheid!"
            - "Lad deine Freunde ein :)"
            - "Erkunde, baue, überlebe!"
            - "Dein Abenteuer beginnt hier!"
            - "Bleib korrekt!"
            - "Immer schön weiter craften!"
            - "Pass auf dich auf!"
            - "Grab nicht direkt nach unten!"
            - "Diamanten warten auf dich!"
            - "Zusammen geht's leichter!"
            - "Respektiere andere Spieler."
            - "Ein netter Chat macht den Server besser."
            - "Pass auf dein Inventar auf!"
            - "Vergiss nicht, dein Zuhause zu setzen."
            - "Schau dir die Serverregeln an."
            - "Nutze /spawn, um sicher zurückzukommen."
            - "Neu hier? Frag einfach das Team!"
            - "Danke, dass du auf diesem Server spielst!"
            - "Hab eine entspannte Session :)"
    biome-popup:
      enabled: false
      check-interval-ticks: 40
      min-check-interval-ticks: 30
      duration-seconds: 7
      text: "<gray>Entering <light_purple>{biome}</light_purple></gray>"
    achievements:
      enabled: false
      provider: "minecraft"
      interval-seconds: 60
      min-interval-seconds: 60
      duration-seconds: 5
      text: "<gray>Achievements: <light_purple>{completed}</light_purple>/<light_purple>{total}</light_purple></gray>"
    nearest-player:
      enabled: false
      check-interval-ticks: 60
      min-check-interval-ticks: 40
      max-distance: 100
      same-world-only: true
      text: "<gray>Nearest: <light_purple>{player}</light_purple> <gray>({distance} blocks)</gray>"
    structure-popup:
      enabled: false
      experimental: true
      check-interval-ticks: 200
      min-check-interval-ticks: 100
      max-distance: 64
      duration-seconds: 7
      text: "<gray>Nearby structure: <light_purple>{structure}</light_purple></gray>"
  actionbar-timer:              # legacy 1.2.0 path; still read when extras.actionbar.timer is missing
    enabled: true
    running-format: "{time}"
    paused-format: "Paused {time}"
    ended-format: "timer ends"
custom-colors:
  - "#AA00AA"
  - "#9932CC"
  - "#BA55D3"
  - "#DDA0DD"
  - "#9370DB"
ram-format: "<gray>RAM: <light_purple>{used}MB / {total}MB ({percent}%)</light_purple> | <light_purple>Ping: {playerPing}ms</light_purple> | Avg: {avgPing}ms</gray>"
