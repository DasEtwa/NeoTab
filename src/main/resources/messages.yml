no-permission: "<gradient:#AA00AA:#BA55D3><bold>No permission.</bold></gradient>"
usage: "<gray>Usage: <light_purple>/tab [reload|setname|style|color|performance]</light_purple></gray>"
reload-success: "<gradient:#AA00AA:#BA55D3><bold>Reloaded.</bold></gradient>"
setname-usage: "<gray>Usage: <light_purple>/tab setname [name]</light_purple></gray>"
setname-success: "<gradient:#AA00AA:#BA55D3><bold>Header name updated.</bold></gradient>"
style-usage: "<gray>Usage: <light_purple>/tab style [rainbow|purple-pulse|gradient-wave|static]</light_purple></gray>"
style-success: "<gradient:#AA00AA:#BA55D3><bold>Style set to {style}.</bold></gradient>"
style-invalid: "<gray>Style must be: <light_purple>rainbow, purple-pulse, gradient-wave, static</light_purple></gray>"
color-usage: "<gray>Usage: <light_purple>/tab color [purple|red|green|gold|#AA00AA,#BA55D3]</light_purple></gray>"
color-success: "<gradient:#AA00AA:#BA55D3><bold>Header color set to {preset}: {colors}.</bold></gradient>"
color-invalid: "<gray>Use a color preset or 1-5 hex colors separated by commas, for example <light_purple>#AA00AA,#BA55D3</light_purple>.</gray>"
performance-usage: "<gray>Usage: <light_purple>/tab performance [smooth|balanced|light|custom ticks|save name]</light_purple> Current: <light_purple>{preset}</light_purple> ({ticks} ticks)</gray>"
performance-custom-usage: "<gray>Usage: <light_purple>/tab performance custom [ticks]</light_purple></gray>"
performance-save-usage: "<gray>Usage: <light_purple>/tab performance save [name]</light_purple></gray>"
performance-success: "<gradient:#AA00AA:#BA55D3><bold>Performance set to {preset} ({ticks} ticks).</bold></gradient>"
performance-save-success: "<gradient:#AA00AA:#BA55D3><bold>Performance preset {name} saved ({ticks} ticks).</bold></gradient>"
performance-invalid-preset: "<gray>Performance preset must be: <light_purple>smooth, balanced, light, custom [ticks], save [name]</light_purple></gray>"
performance-invalid-ticks: "<gray>Ticks must be a number from <light_purple>{min}</light_purple> to <light_purple>{max}</light_purple>.</gray>"
performance-invalid-name: "<gray>Preset names may use only letters, numbers, - and _, max 32 chars, and cannot replace built-in presets.</gray>"
command-unknown: "<gray>Unknown subcommand. <light_purple>/tab</light_purple></gray>"
