name: NeoTab
version: "${version}"
main: de.NeoTab.neotab.NeoTab
api-version: "1.20"
softdepend: [LuckPerms, PlaceholderAPI]
description: Animated tablist header and footer with stats, PlaceholderAPI support, and toggles
author: muffinonboard aka DasEtwa

commands:
  tab:
    description: NeoTab main command
    usage: /tab <reload|setname|style|color|performance|gui|sb|timer>
    aliases: [neotab]

permissions:
  neotab.admin:
    description: Allows all NeoTab admin commands
    default: op
    children:
      neotab.reload: true
      neotab.setname: true
      neotab.style: true
      neotab.color: true
      neotab.performance: true
      neotab.gui: true
      neotab.scoreboard: true
      neotab.scoreboard.toggle: true
      neotab.scoreboard.edit: true
      neotab.scoreboard.presets: true
      neotab.timer: true
      neotab.timer.admin: true
      neotab.update.notify: true
  neotab.reload:
    description: Allows reloading the config
    default: op
  neotab.setname:
    description: Allows changing server name
    default: op
  neotab.style:
    description: Allows changing animation style
    default: op
  neotab.color:
    description: Allows changing header animation colors
    default: op
  neotab.performance:
    description: Allows changing and saving NeoTab performance presets
    default: op
  neotab.gui:
    description: Allows opening the NeoTab control panel
    default: op
  neotab.scoreboard:
    description: Allows using NeoTab scoreboard commands and GUI controls
    default: op
  neotab.scoreboard.toggle:
    description: Allows toggling the NeoTab scoreboard
    default: op
  neotab.scoreboard.edit:
    description: Allows editing the NeoTab scoreboard title and lines
    default: op
  neotab.scoreboard.presets:
    description: Allows saving and loading NeoTab scoreboard presets
    default: op
  neotab.timer:
    description: Allows using the NeoTab ActionBar Timer
    default: op
  neotab.timer.admin:
    description: Reserved for future ActionBar Timer admin controls
    default: op
  neotab.update.notify:
    description: Shows NeoTab update notifications
    default: op
  neotab.admin.*:
    description: Wildcard for all admin permissions
    default: op
    children:
      neotab.admin: true
      neotab.reload: true
      neotab.setname: true
      neotab.style: true
      neotab.color: true
      neotab.performance: true
      neotab.gui: true
      neotab.scoreboard: true
      neotab.scoreboard.toggle: true
      neotab.scoreboard.edit: true
      neotab.scoreboard.presets: true
      neotab.timer: true
      neotab.timer.admin: true
      neotab.update.notify: true
