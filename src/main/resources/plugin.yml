name: NeoTab
version: "${version}"
main: de.NeoTab.neotab.NeoTab
api-version: "1.20"
softdepend: [LuckPerms, PlaceholderAPI]
description: Animated tablist header and footer with stats, PlaceholderAPI support, and toggles
author: muffinonboard aka DasEtwa

commands:
  tab:
    description: NeoTab main command
    usage: /tab <reload|setname|style|color|performance|gui|sb|timer|stopwatch|clock>
    aliases: [neotab]

permissions:
  neotab.admin:
    description: Allows all NeoTab admin commands
    default: op
    children:
      neotab.reload: true
      neotab.setname: true
      neotab.style: true
      neotab.color: true
      neotab.performance: true
      neotab.gui: true
      neotab.scoreboard: true
      neotab.scoreboard.toggle: true
      neotab.scoreboard.edit: true
      neotab.scoreboard.presets: true
      neotab.timer: true
      neotab.timer.admin: true
      neotab.extras: true
      neotab.extras.actionbar: true
      neotab.extras.clock: true
      neotab.extras.welcome: true
      neotab.extras.randommessages: true
      neotab.extras.stopwatch: true
      neotab.extras.biome: true
      neotab.extras.achievements: true
      neotab.extras.nearestplayer: true
      neotab.extras.structure: true
      neotab.update.notify: true
  neotab.reload:
    description: Allows reloading the config
    default: op
  neotab.setname:
    description: Allows changing server name
    default: op
  neotab.style:
    description: Allows changing animation style
    default: op
  neotab.color:
    description: Allows changing header animation colors
    default: op
  neotab.performance:
    description: Allows changing and saving NeoTab performance presets
    default: op
  neotab.gui:
    description: Allows opening the NeoTab control panel
    default: op
  neotab.scoreboard:
    description: Allows using NeoTab scoreboard commands and GUI controls
    default: op
  neotab.scoreboard.toggle:
    description: Allows toggling the NeoTab scoreboard
    default: op
  neotab.scoreboard.edit:
    description: Allows editing the NeoTab scoreboard title and lines
    default: op
  neotab.scoreboard.presets:
    description: Allows saving, loading, and deleting NeoTab scoreboard presets
    default: op
  neotab.timer:
    description: Allows using the NeoTab ActionBar Timer
    default: op
  neotab.timer.admin:
    description: Reserved for future ActionBar Timer admin controls
    default: op
  neotab.extras:
    description: Allows using NeoTab Extras
    default: op
  neotab.extras.actionbar:
    description: Allows using NeoTab ActionBar extras
    default: op
  neotab.extras.clock:
    description: Allows toggling and configuring the ActionBar clock
    default: op
  neotab.extras.welcome:
    description: Allows toggling the ActionBar welcome message
    default: op
  neotab.extras.randommessages:
    description: Allows toggling random ActionBar messages
    default: op
  neotab.extras.stopwatch:
    description: Allows using the ActionBar Stopwatch
    default: op
  neotab.extras.biome:
    description: Allows toggling biome ActionBar popups
    default: op
  neotab.extras.achievements:
    description: Allows toggling ActionBar achievement counts
    default: op
  neotab.extras.nearestplayer:
    description: Allows toggling the nearest-player ActionBar module
    default: op
  neotab.extras.structure:
    description: Allows viewing experimental structure popup controls
    default: op
  neotab.update.notify:
    description: Shows NeoTab update notifications
    default: op
  neotab.admin.*:
    description: Wildcard for all admin permissions
    default: op
    children:
      neotab.admin: true
      neotab.reload: true
      neotab.setname: true
      neotab.style: true
      neotab.color: true
      neotab.performance: true
      neotab.gui: true
      neotab.scoreboard: true
      neotab.scoreboard.toggle: true
      neotab.scoreboard.edit: true
      neotab.scoreboard.presets: true
      neotab.timer: true
      neotab.timer.admin: true
      neotab.extras: true
      neotab.extras.actionbar: true
      neotab.extras.clock: true
      neotab.extras.welcome: true
      neotab.extras.randommessages: true
      neotab.extras.stopwatch: true
      neotab.extras.biome: true
      neotab.extras.achievements: true
      neotab.extras.nearestplayer: true
      neotab.extras.structure: true
      neotab.update.notify: true
